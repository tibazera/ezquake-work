name: Replace with new zip

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL do zip (deixe vazio para usar o zip do repositório)'
        required: false
        default: ''

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Replace all files
      run: |
        # Remove everything except .git folder and the zip itself
        find . -mindepth 1 -maxdepth 1 \
          ! -name '.git' \
          ! -name 'ezquake-merged.zip' \
          -exec rm -rf {} +

        # Extract zip
        unzip -q ezquake-merged.zip

        # Move contents up
        cp -r ezquake-merged/. .
        rm -rf ezquake-merged
        rm -f ezquake-merged.zip

    - name: Commit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Replace with updated source"
        git push
