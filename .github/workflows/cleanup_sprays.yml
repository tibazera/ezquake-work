name: Cleanup - Remove Spray System

on:
  workflow_dispatch:

jobs:
  remove-sprays:
    name: Remove spray code and commit
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Remove spray references from source files
      run: |
        echo "=== Scanning for spray references in src/ ==="

        find src -type f \( -name "*.c" -o -name "*.h" \) | while read -r f; do
          if grep -qiE "CL_Sprays[A-Za-z_]*|cl_sprays\.h" "$f"; then
            echo "  Patching: $f"
            sed -i -E \
              -e '/CL_Sprays[A-Za-z_]*/d' \
              -e '/cl_sprays\.h/d' \
              "$f"
          fi
        done

        if grep -q "cl_sprays" CMakeLists.txt; then
          echo "  Patching: CMakeLists.txt"
          sed -i '/cl_sprays/d' CMakeLists.txt
        fi

        for f in src/cl_sprays.c src/cl_sprays.h; do
          if [ -f "$f" ]; then
            echo "  Deleting: $f"
            git rm -f "$f"
          fi
        done

        echo "=== Modified files ==="
        git diff --name-only

    - name: Remove this workflow file
      run: |
        git rm -f .github/workflows/cleanup_sprays.yml
        echo "  Deleted: cleanup_sprays.yml"

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Remove spray system" || echo "Nothing to commit"
        git push
