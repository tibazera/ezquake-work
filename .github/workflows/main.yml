name: main

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: ezQuake-linux-x86_64
    runs-on: ubuntu-latest
    container:
      image: debian:testing
      options: --privileged

    steps:
    - name: Prepare environment
      run: |
        apt-get -qq update && apt-get -qq install --no-install-recommends \
          build-essential ca-certificates cmake curl file git \
          libcurl4-openssl-dev libexpat1-dev libfreetype-dev libfuse3-dev \
          libjansson-dev libjpeg-dev libminizip-dev libpcre2-dev libpng-dev \
          libsdl2-2.0-0 libsdl2-dev libsndfile1-dev libspeex-dev \
          libspeexdsp-dev ninja-build unzip sed fuse3 imagemagick
        git config --global --add safe.directory $PWD

    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone qwprot (QW-Community fork)
      run: git clone https://github.com/QW-Community/qwprot.git src/qwprot

    - name: Apply compatibility patches
      run: |
        sed -i 's/pmove\.cmd\.impulse_pred/pmove.cmd.impulse/g' src/pmove.c
        grep -q 'client_ruleset' src/cmdline_params_ids.h || \
          sed -i '/client_noscripts/a CMDLINE_DEF(client_ruleset, "-ruleset"),' src/cmdline_params_ids.h

    - name: Fetch upstream tags
      run: |
        git remote add upstream https://github.com/QW-Group/ezquake-source.git || true
        git fetch --tags --no-recurse-submodules upstream || true

    - name: Configure
      run: cmake --preset dynamic
      env:
        CFLAGS: "-march=nehalem"

    - name: Build
      run: cmake --build build-dynamic --config Release

    - name: Generate AppImage
      run: |
        export EXECUTABLE=$(find build-dynamic -name "ezquake*" -type f | head -1)
        ICON_PATH="dist/linux/io.github.ezQuake.128.png"
        if [ ! -f "$ICON_PATH" ]; then
          mkdir -p dist/linux
          curl -fsSL "https://raw.githubusercontent.com/QW-Group/ezquake-source/master/dist/linux/io.github.ezQuake.128.png" \
            -o "$ICON_PATH" 2>/dev/null || \
          convert -size 128x128 xc:#1a3a6a -fill white -gravity center \
            -pointsize 18 -annotate 0 "ezQuake" "$ICON_PATH" 2>/dev/null || true
        fi
        ./misc/appimage/appimage-manual_creation.sh
        mv ezQuake-x86_64.AppImage build-dynamic/Release/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ezQuake-linux-x86_64
        path: build-dynamic/Release/ezQuake-x86_64.AppImage
        compression-level: 9

  windows:
    name: ezQuake-windows-x64
    runs-on: windows-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/Microsoft/vcpkg.git vcpkg
        .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

    - name: Clone qwprot (QW-Community fork)
      shell: pwsh
      run: git clone https://github.com/QW-Community/qwprot.git src/qwprot

    - name: Apply compatibility patches
      shell: pwsh
      run: |
        (Get-Content src/pmove.c) -replace 'pmove\.cmd\.impulse_pred','pmove.cmd.impulse' | Set-Content src/pmove.c
        $ids = Get-Content src/cmdline_params_ids.h -Raw
        if ($ids -notmatch 'client_ruleset') {
          $ids = $ids -replace '(client_noscripts[^\n]*\n)', "`$1CMDLINE_DEF(client_ruleset, `"-ruleset`"),`n"
          Set-Content src/cmdline_params_ids.h $ids
        }

    - name: Add vcpkg baseline to vcpkg.json
      shell: pwsh
      run: |
        $vcpkgCommit = git -C vcpkg rev-parse HEAD
        $json = Get-Content vcpkg.json -Raw | ConvertFrom-Json
        $json | Add-Member -NotePropertyName "builtin-baseline" -NotePropertyValue $vcpkgCommit -Force
        $json | ConvertTo-Json -Depth 10 | Set-Content vcpkg.json

    - name: Fetch upstream tags
      shell: pwsh
      continue-on-error: true
      run: |
        git remote add upstream https://github.com/QW-Group/ezquake-source.git
        git fetch --tags --no-recurse-submodules upstream

    - name: Set library build type to release
      shell: pwsh
      run: |
        Get-ChildItem cmake/triplets/*.cmake | ForEach-Object {
          Add-Content $_.FullName "`nset(VCPKG_BUILD_TYPE release)"
        }

    - uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~3.28.0"

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Configure and Build
      uses: lukka/run-cmake@v10
      with:
        configurePreset: msbuild-x64
        buildPreset: msbuild-x64-release
      env:
        VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ezQuake-windows-x64
        path: build-msbuild-x64/Release/ezquake.exe
        compression-level: 9
